<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>体調記録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #1a6fa8;
      --accent:     #0e9e6e;
      --bg:         #f2f6fa;
      --card:       #ffffff;
      --text:       #1a1f2e;
      --muted:      #6b7a8d;
      --border:     #dbe4ee;
      --radius:     18px;
      --shadow:     0 4px 20px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    .header {
      background: var(--primary);
      color: #fff;
      padding: 28px 20px 22px;
      text-align: center;
    }
    .header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.04em; }
    .header p  { font-size: 0.8rem; opacity: 0.82; margin-top: 6px; line-height: 1.6; }
    .content { padding: 20px 16px 0; }
    .vas-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 20px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.4s ease both;
    }
    .vas-card:nth-child(2) { animation-delay: 0.08s; }
    .vas-card:nth-child(3) { animation-delay: 0.16s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .vas-card .question {
      font-size: 1rem; font-weight: 700;
      line-height: 1.55; margin-bottom: 18px;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 7px; border-radius: 4px;
      outline: none; cursor: pointer; background: var(--border);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--primary);
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(26,111,168,0.35);
      cursor: pointer; transition: transform 0.1s;
    }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.15); }
    input[type="range"]::-moz-range-thumb {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--primary); border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(26,111,168,0.35); cursor: pointer;
    }
    .vas-labels {
      display: flex; justify-content: space-between; margin-top: 10px;
    }
    .vas-labels span {
      font-size: 0.78rem; color: var(--muted);
      line-height: 1.35; max-width: 90px;
    }
    .vas-labels span:first-child { text-align: left; }
    .vas-labels span:last-child  { text-align: right; }
    #save-btn {
      display: block; width: 100%; padding: 18px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-size: 1.05rem;
      font-weight: 700; font-family: inherit; cursor: pointer;
      margin-top: 20px; letter-spacing: 0.06em;
      box-shadow: 0 4px 14px rgba(14,158,110,0.35);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    #save-btn:active   { transform: scale(0.97); box-shadow: none; }
    #save-btn:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; }
    #status {
      text-align: center; margin-top: 18px;
      font-size: 0.92rem; font-weight: 700;
      min-height: 1.6em; line-height: 1.6; padding: 0 8px;
    }
    .st-ok   { color: var(--accent); }
    .st-err  { color: #c62828; }
    .st-wait { color: var(--muted); }
    footer {
      text-align: center; margin-top: 32px;
      font-size: 0.72rem; color: var(--muted); opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>体調・空腹感の記録</h1>
  <p>スライダーを動かして現在の状態を選び<br>「記録を保存する」を押してください</p>
</div>

<div class="content">

  <div class="vas-card">
    <div class="question">今、どのくらい満腹ですか？</div>
    <input type="range" min="0" max="100" step="0.1" value="50" id="satiety-slider">
    <div class="vas-labels">
      <span>まったく<br>満腹でない</span>
      <span>かなり<br>満腹である</span>
    </div>
  </div>

  <div class="vas-card">
    <div class="question">今、どのくらい空腹ですか？</div>
    <input type="range" min="0" max="100" step="0.1" value="50" id="hunger-slider">
    <div class="vas-labels">
      <span>まったく<br>空腹でない</span>
      <span>かなり<br>空腹である</span>
    </div>
  </div>

  <div class="vas-card">
    <div class="question">今、どのくらい眠いですか？</div>
    <input type="range" min="0" max="100" step="0.1" value="50" id="sleepiness-slider">
    <div class="vas-labels">
      <span>まったく<br>眠くない</span>
      <span>非常に<br>眠い</span>
    </div>
  </div>

  <button id="save-btn">記録を保存する</button>
  <p id="status"></p>
  <footer>本フォームは研究目的で使用されます</footer>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwyYBWkq6o9mvMJKCPx7VH8YD9I7MAz7IYZQj7oXSheb6KyPU33cW-Zw2VN-jXWKThwtg/exec";

  const sliders = document.querySelectorAll("input[type='range']");

  function updateRail(slider) {
    const v = parseFloat(slider.value);
    slider.style.background =
      `linear-gradient(to right, var(--primary) 0%, var(--primary) ${v}%, var(--border) ${v}%, var(--border) 100%)`;
  }

  sliders.forEach(s => {
    s.addEventListener("input", () => updateRail(s));
    updateRail(s);
  });

  function resetSliders() {
    sliders.forEach(s => { s.value = 50; updateRail(s); });
  }

  function getTimestamp() {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  }

  document.getElementById("save-btn").addEventListener("click", async () => {
    const statusEl = document.getElementById("status");
    const btn      = document.getElementById("save-btn");

    btn.disabled         = true;
    statusEl.textContent = "送信中…";
    statusEl.className   = "st-wait";

    const payload = {
      timestamp:  getTimestamp(),
      satiety:    document.getElementById("satiety-slider").value,
      hunger:     document.getElementById("hunger-slider").value,
      sleepiness: document.getElementById("sleepiness-slider").value
    };

    try {
      await fetch(GAS_URL, {
        method:  "POST",
        mode:    "no-cors",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload)
      });

      resetSliders();

      statusEl.innerHTML = "✅ 記録が完了しました。<br>ありがとうございました。";
      statusEl.className = "st-ok";

    } catch (err) {
      statusEl.textContent = "❌ 通信エラーです。電波状況を確認してください。";
      statusEl.className   = "st-err";
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
